name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: wordlock-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: v1.0.0
        name: WordLock v1.0.0
        body: |
          # WordLock 🔤
          
          A daily vocabulary builder that shows a new English word and its Nepali meaning on your lock screen.
          
          ## Installation
          1. Download the APK below
          2. Install on your Android phone
          3. Open WordLock → tap "Enable Lock Screen Notification"
          4. Grant notification permission
          5. New word appears on your lock screen every day!
        files: app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

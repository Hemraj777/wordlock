name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'
        validate-wrappers: false

    - name: Generate Keystore
      run: |
        keytool -genkeypair -v \
          -keystore app/wordlock.keystore \
          -alias wordlock \
          -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -storepass wordlock123 \
          -keypass wordlock123 \
          -dname "CN=Hemraz777, OU=Dev, O=WordLock, L=Kathmandu, ST=Bagmati, C=NP"

    - name: Build Signed APK
      run: gradle assembleRelease --no-daemon

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: wordlock-apk
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error

    - name: Delete old release if exists
      run: |
        gh release delete v1.3.0 --yes --cleanup-tag 2>/dev/null || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.3.0
        name: WordLock v1.3.0
        body: |
          # WordLock v1.3.0
          
          New: Home screen widget + lock screen overlay.
          
          ## Features
          - **Lock screen overlay** — floating paper with word on each unlock
          - **Home screen widget** — shows word, updates every 5 minutes, tap to refresh
          - **1011 words** with English + Nepali meanings
          
          ## Widget
          1. Long-press home screen → Widgets → WordLock
          2. Or tap "Add Widget to Home Screen" in the app
          3. Tap the widget to get a new word
        files: app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
